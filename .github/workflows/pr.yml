name: PR Build

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Read mod version
        id: props
        run: |
          mod_version=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          minecraft_version_mod=$(grep '^minecraft_version_mod' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "jar_name=watson-fabric-${mod_version}+${minecraft_version_mod}.jar" >> "$GITHUB_OUTPUT"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.props.outputs.jar_name }}
          path: build/libs/${{ steps.props.outputs.jar_name }}
          if-no-files-found: error
