name: Publish

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Read mod version
        id: props
        run: |
          mod_version=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          minecraft_version_mod=$(grep '^minecraft_version_mod' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "mod_version=${mod_version}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version_mod=${minecraft_version_mod}" >> "$GITHUB_OUTPUT"
          echo "tag=v${mod_version}+${minecraft_version_mod}" >> "$GITHUB_OUTPUT"
          echo "jar_name=watson-fabric-${mod_version}+${minecraft_version_mod}.jar" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Configure git
        run: |
          git config user.name "felix.haffk"
          git config user.email "felix.haffk@digitaldrugs.tech"

      - name: Create and push tag
        run: |
          git tag "${{ steps.props.outputs.tag }}"
          git push origin "${{ steps.props.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.props.outputs.tag }}
          name: Watson ${{ steps.props.outputs.mod_version }} for ${{ steps.props.outputs.minecraft_version_mod }}
          files: build/libs/${{ steps.props.outputs.jar_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
